mqtt:
  broker: localhost
  port: 1883
  transport: tcp
  ws_path: /
  auth_method: auto
  username: null
  password: null
  topic_prefix: meshcore
  qos: 0
  retain: false
  token_audience: null
  token_owner: null
  token_email: null
  token_expiry_seconds: 3600
  token_public_key: null
  token_private_key: null
  tls_enabled: false
  tls_ca_cert: null
  tls_client_cert: null
  tls_client_key: null
  tls_insecure: false

meshcore:
  connection_type: tcp
  address: "192.168.1.100"
  port: 5000
  baudrate: 115200
  timeout: 5
  auto_fetch_restart_delay: 5
  events:
    - CONTACT_MSG_RECV
    - CHANNEL_MSG_RECV
    - CONNECTED
    - DISCONNECTED
    - LOGIN_SUCCESS
    - LOGIN_FAILED
    - MESSAGES_WAITING
    - DEVICE_INFO
    - BATTERY
    - NEW_CONTACT
    - ADVERTISEMENT

log_level: INFO
